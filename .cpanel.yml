---
deployment:
  tasks:
    # Export deployment timestamp
    - export DEPLOYMETimestamp=$(date +"%Y%m%d%H%M%S")
    
    # Install Node.js dependencies
    - cd $DEPLOYPATH && npm install
    
    # Build the project
    - cd $DEPLOYPATH && npm run build
    
    # Copy build files to public_html
    - /bin/cp -R $DEPLOYPATH/dist/* $DEPLOYPATH/public_html/
    
    # Create .htaccess for SPA routing
    - |
      cat > $DEPLOYPATH/public_html/.htaccess << 'EOF'
      <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
      </IfModule>
      
      # Enable gzip compression
      <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css application/javascript application/json
      </IfModule>
      
      # Cache static assets
      <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpg "access plus 1 year"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/svg+xml "access plus 1 year"
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
      </IfModule>
      EOF
    
    # Set correct permissions
    - chmod -R 755 $DEPLOYPATH/public_html
    - find $DEPLOYPATH/public_html -type f -exec chmod 644 {} \;
    
    # Log deployment
    - echo "Deployment completed at $(date)" >> $DEPLOYPATH/deployments.log
